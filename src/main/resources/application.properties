spring.application.name=sistemadevoluntariado
# ── Servidor ──────────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/sistemadevoluntariado
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# ── Base de datos ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_voluntariado?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# No fallar al arrancar si la BD no está disponible
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# ── Vistas ──────────────────────────────────────────────────────────────
# (sin view resolver JSP – las vistas se sirven como forward directo)

# ── Sesión ─────────────────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Subida de archivos ─────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
