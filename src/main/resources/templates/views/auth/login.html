<%@ page contentType="text/html;charset=UTF-8" pageEncoding="UTF-8" %>
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Voluntariado</title>
    <script>
        // Detectar context-path dinámicamente
        var ctx = document.location.pathname.substring(0,
            document.location.pathname.indexOf('/', 1));
    </script>
    <!-- CSS se carga dinámicamente con context-path en el script inferior -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="login-background">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <img id="logoImg" src="" alt="Logo Voluntariado">
                </div>
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

                <div class="alert-error" id="errorBox" style="opacity: 0;">
                    <span id="errorMsg"></span>
                </div>

                <form id="loginForm" method="post" class="login-form">
                    <div class="form-group">
                        <label for="usuario">Usuario</label>
                        <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="clave">Contraseña</label>
                        <input type="password" id="clave" name="clave" placeholder="Tu contraseña" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">Recordarme
                            <input type="checkbox" name="remember">
                            <span class="checkmark"></span>
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>

                <div class="login-footer">
                    <p>¿No tienes una cuenta? <a href="#">Contáctanos</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Resolver context-path para recursos
        (function () {
            var ctx = '';
            var path = window.location.pathname; // e.g. /sistemadevoluntariado/login
            var idx = path.indexOf('/login');
            if (idx > 0) {
                ctx = path.substring(0, idx); // e.g. /sistemadevoluntariado
            }

            // Cargar CSS dinámicamente
            var css = document.createElement('link');
            css.rel = 'stylesheet';
            css.href = ctx + '/css/login.css';
            document.head.appendChild(css);

            // Logo
            document.getElementById('logoImg').src = ctx + '/img/logo.png';

            // Form action
            document.getElementById('loginForm').action = ctx + '/doLogin';

            // Mostrar error si viene en la URL
            var params = new URLSearchParams(window.location.search);
            if (params.has('error')) {
                document.getElementById('errorBox').style.opacity = '1';
                document.getElementById('errorMsg').textContent = 'Usuario o contraseña incorrectos';
            }
            if (params.has('logout')) {
                document.getElementById('errorBox').style.opacity = '1';
                document.getElementById('errorBox').style.borderColor = '#28a745';
                document.getElementById('errorBox').style.backgroundColor = '#d4edda';
                document.getElementById('errorBox').style.color = '#155724';
                document.getElementById('errorMsg').textContent = 'Sesión cerrada correctamente';
            }
        })();
    </script>
    <script>
        // Cargar login.js dinámicamente
        (function () {
            var path = window.location.pathname;
            var idx = path.indexOf('/login');
            var ctx = idx > 0 ? path.substring(0, idx) : '';
            var s = document.createElement('script');
            s.src = ctx + '/js/login.js';
            document.body.appendChild(s);
        })();
    </script>
</body>

</html>
